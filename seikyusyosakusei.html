<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INVOICE CREATOR</title>
<style>
  :root{
    --navy:#0f1923;
    --navy2:#2c3e55;
    --gold:#c0a96e;
    --gold-soft:#f0e8d5;
    --bg:#f4f5f7;
    --muted:#7a8496;
    --border:#d8dce6;
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
    background:var(--bg);
    color:var(--navy);
    min-width:320px;
    font-size:15px;
    line-height:1.5;
    -webkit-text-size-adjust:100%;
  }
  /* ===== Header ===== */
  header{
    background:var(--navy);
    color:#fff;
    padding:16px 18px;
    text-align:center;
  }
  header h1{
    margin:0;
    font-size:18px;
    letter-spacing:.18em;
    font-weight:600;
  }
  header .sub{
    font-size:11px;
    color:var(--gold);
    letter-spacing:.2em;
    margin-top:3px;
  }
  /* ===== Progress ===== */
  .progress{
    display:flex;
    background:var(--navy2);
  }
  .progress .step{
    flex:1;
    text-align:center;
    padding:10px 2px;
    color:#9fb0c4;
    font-size:11px;
    position:relative;
    transition:.2s;
  }
  .progress .step .num{
    display:block;
    font-size:14px;
    font-weight:700;
    letter-spacing:.05em;
  }
  .progress .step .lbl{font-size:10.5px;}
  .progress .step.active{
    color:var(--navy);
    background:var(--gold);
  }
  .progress .step.done{color:var(--gold);}
  /* ===== Layout ===== */
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 90px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  /* ===== Card ===== */
  .card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 2px 10px rgba(15,25,35,.06);
    padding:18px 16px;
    margin-bottom:16px;
  }
  .card-title{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:15px;
    font-weight:700;
    margin:0 0 14px;
  }
  .card-title::before{
    content:"";
    width:4px;height:18px;
    background:var(--gold);
    border-radius:2px;
  }
  .field{margin-bottom:13px;}
  .field:last-child{margin-bottom:0;}
  label{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:5px;
    font-weight:600;
  }
  label .opt{color:#aab2c0;font-weight:400;}
  input[type=text],input[type=tel],input[type=number],input[type=date],textarea,select{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    padding:11px 12px;
    font-size:15px;
    font-family:inherit;
    color:var(--navy);
    background:#fff;
    outline:none;
    transition:.15s;
  }
  input:focus,textarea:focus,select:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(192,169,110,.18);
  }
  textarea{resize:vertical;min-height:80px;}
  .row2{display:flex;gap:10px;}
  .row2>*{flex:1;}
  .suffix-wrap{position:relative;}
  .suffix-wrap .suffix{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:13px;pointer-events:none;
  }
  /* ===== Detail rows ===== */
  .detail-row{
    border:1px solid var(--border);
    border-radius:8px;
    padding:11px;
    margin-bottom:10px;
    position:relative;
    background:#fafbfc;
  }
  .detail-row .dr-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:9px;
  }
  .detail-row .dr-no{font-size:12px;font-weight:700;color:var(--gold);}
  .detail-row .dr-del{
    border:none;background:none;color:#c0556a;font-size:12.5px;
    cursor:pointer;padding:2px 4px;font-weight:600;
  }
  .detail-row .dr-amt{
    text-align:right;font-size:13px;color:var(--navy);font-weight:700;
    margin-top:6px;
  }
  .detail-row .dr-amt span{color:var(--muted);font-weight:500;font-size:11.5px;margin-right:5px;}
  .grid3{display:flex;gap:8px;}
  .grid3 .g-name{flex:2;}
  .grid3 .g-qty{flex:1.1;}
  .grid3 .g-price{flex:1.3;}
  .mini-lbl{font-size:10.5px;color:var(--muted);margin-bottom:3px;display:block;}
  .grid3 input{padding:9px 9px;font-size:14px;}
  .add-btn{
    width:100%;border:1.5px dashed var(--gold);background:var(--gold-soft);
    color:#8a763f;border-radius:8px;padding:11px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .add-btn:disabled{opacity:.45;cursor:not-allowed;}
  /* ===== Totals mini ===== */
  .totbox{
    background:#fff;border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;margin-top:12px;
  }
  .totbox .tline{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
  .totbox .tline.grand{
    border-top:1px solid var(--border);margin-top:5px;padding-top:9px;
    font-weight:700;font-size:16px;
  }
  .totbox .tline.grand b{color:var(--gold);}
  /* ===== Stamp ===== */
  .stamp-area{text-align:center;}
  .stamp-btn{
    border:1.5px solid var(--gold);background:#fff;color:#8a763f;
    border-radius:8px;padding:11px 18px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .stamp-preview{margin-top:14px;}
  .stamp-preview img{
    width:84px;height:84px;border-radius:50%;object-fit:cover;
    border:1px solid var(--border);
  }
  .stamp-preview .rm{
    display:block;margin-top:8px;background:none;border:none;color:#c0556a;
    font-size:12.5px;cursor:pointer;font-weight:600;
  }
  /* ===== Buttons nav ===== */
  .nav-btns{
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(255,255,255,.96);
    border-top:1px solid var(--border);
    padding:12px 14px;
    display:flex;gap:10px;
    max-width:560px;margin:0 auto;
    backdrop-filter:blur(6px);
  }
  .btn{
    flex:1;border-radius:9px;padding:14px;font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;border:1.5px solid transparent;
  }
  .btn-next{background:var(--navy);color:#fff;}
  .btn-back{background:#fff;color:var(--navy);border-color:var(--border);}
  .btn-pdf{background:var(--gold);color:var(--navy);}
  /* ===== Preview (STEP4) ===== */
  .preview-note{
    font-size:12.5px;color:var(--muted);background:var(--gold-soft);
    border-radius:8px;padding:10px 12px;margin-bottom:14px;line-height:1.6;
  }
  .inv-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .invoice{
    background:#fff;color:#222;width:720px;margin:0 auto;
    font-family:'Hiragino Mincho ProN','MS Mincho',serif;
    padding:34px 40px;font-size:13px;
  }
  .invoice .iv-title{text-align:center;font-size:30px;letter-spacing:.5em;margin:0 0 26px;font-weight:600;}
  .invoice .iv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;}
  .invoice .iv-client{font-size:18px;display:flex;gap:30px;align-items:baseline;padding-top:6px;}
  .invoice .iv-issuer{position:relative;text-align:left;font-size:13px;line-height:1.85;min-width:300px;display:flex;gap:14px;align-items:flex-start;}
  .invoice .iv-issuer .iv-info .nm{font-weight:700;font-size:15px;letter-spacing:.15em;}
  .invoice .iv-stamp img{width:62px;height:62px;border-radius:50%;object-fit:cover;}
  .invoice .iv-body{margin-bottom:18px;line-height:2;}
  .invoice .iv-body .ind{margin-left:2em;}
  .invoice .iv-grand{display:flex;width:50%;border:2px solid #333;margin-bottom:26px;}
  .invoice .iv-grand .g-lbl{flex:0 0 40%;padding:11px 14px;font-size:15px;border-right:1px solid #333;}
  .invoice .iv-grand .g-val{flex:1;padding:11px 14px;text-align:right;font-size:15px;}
  .invoice table{width:100%;border-collapse:collapse;margin-bottom:28px;}
  .invoice th,.invoice td{border:1px solid #333;padding:8px 10px;font-size:13px;}
  .invoice th{text-align:center;font-weight:500;letter-spacing:.2em;}
  .invoice td.c{text-align:center;}
  .invoice td.r{text-align:right;}
  .invoice .col-name{width:50%;}
  .invoice .col-qty{width:14%;}
  .invoice .col-price{width:18%;}
  .invoice .col-amt{width:18%;}
  .invoice .sum-lbl{text-align:center;letter-spacing:.2em;}
  .invoice .iv-remark{border:1px solid #333;}
  .invoice .iv-remark .rm-h{text-align:center;letter-spacing:.5em;padding:8px;border-bottom:1px solid #333;font-size:13px;}
  .invoice .iv-remark .rm-b{min-height:90px;padding:10px;font-size:13px;white-space:pre-wrap;}
  /* ===== Toast ===== */
  #toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:11px 20px;border-radius:24px;
    font-size:13px;opacity:0;pointer-events:none;transition:.3s;z-index:9999;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1>INVOICE CREATOR</h1>
  <div class="sub">スマホでかんたん請求書</div>
</header>

<div class="progress" id="progress">
  <div class="step active" data-step="1"><span class="num">01</span><span class="lbl">基本情報</span></div>
  <div class="step" data-step="2"><span class="num">02</span><span class="lbl">明細</span></div>
  <div class="step" data-step="3"><span class="num">03</span><span class="lbl">印鑑・備考</span></div>
  <div class="step" data-step="4"><span class="num">04</span><span class="lbl">確認・出力</span></div>
</div>

<div class="wrap">

  <!-- STEP 1 -->
  <section class="panel active" id="panel1">
    <div class="card">
      <h2 class="card-title">請求先</h2>
      <div class="field">
        <label>会社名（「御中」は自動付与）</label>
        <input type="text" id="clientName" placeholder="例：株式会社サンプル商事">
      </div>
      <div class="field">
        <label>担当者名 <span class="opt">（任意）</span></label>
        <input type="text" id="clientPerson" placeholder="例：山田 太郎">
      </div>
    </div>
    <div class="card">
      <h2 class="card-title">発行者</h2>
      <div class="field">
        <label>氏名</label>
        <input type="text" id="issuerName" placeholder="例：山田 太郎">
      </div>
      <div class="field">
        <label>郵便番号</label>
        <input type="text" id="issuerZip" placeholder="例：100-0001">
      </div>
      <div class="field">
        <label>住所</label>
        <input type="text" id="issuerAddr" placeholder="例：東京都千代田区〇〇1-2-3">
      </div>
      <div class="field">
        <label>電話番号</label>
        <input type="tel" id="issuerTel" placeholder="例：090-1234-5678">
      </div>
      <div class="field">
        <label>FAX <span class="opt">（任意）</span></label>
        <input type="tel" id="issuerFax" placeholder="例：03-1234-5678">
      </div>
    </div>
    <div class="card">
      <h2 class="card-title">請求内容</h2>
      <div class="field">
        <label>件名</label>
        <input type="text" id="subject" placeholder="例：作業代">
      </div>
      <div class="field">
        <label>支払期限</label>
        <input type="text" id="dueDate" placeholder="例：2026年7月末日">
      </div>
      <div class="field">
        <label>振込先</label>
        <textarea id="bank" placeholder="例：〇〇銀行 〇〇支店 普通 1234567 ヤマダ タロウ"></textarea>
      </div>
    </div>
  </section>

  <!-- STEP 2 -->
  <section class="panel" id="panel2">
    <div class="card">
      <h2 class="card-title">明細</h2>
      <div id="detailList"></div>
      <button class="add-btn" id="addRow" onclick="addRow()">＋ 品目を追加（最大10行）</button>

      <div class="field" style="margin-top:16px;">
        <label>消費税</label>
        <select id="taxType" onchange="recalc()">
          <option value="0">なし</option>
          <option value="10">10%</option>
          <option value="8">8%（軽減税率）</option>
        </select>
      </div>

      <div class="totbox">
        <div class="tline"><span>小計</span><span id="mSub">¥0</span></div>
        <div class="tline"><span>消費税</span><span id="mTax">¥0</span></div>
        <div class="tline grand"><span>合計</span><b id="mTotal">¥0</b></div>
      </div>
    </div>
  </section>

  <!-- STEP 3 -->
  <section class="panel" id="panel3">
    <div class="card">
      <h2 class="card-title">印鑑画像</h2>
      <div class="stamp-area">
        <input type="file" id="stampInput" accept="image/*" style="display:none" onchange="onStampSelect(event)">
        <button class="stamp-btn" onclick="document.getElementById('stampInput').click()">印鑑画像を選択</button>
        <div class="stamp-preview" id="stampPreview"></div>
      </div>
    </div>
    <div class="card">
      <h2 class="card-title">備考</h2>
      <div class="field">
        <label>備考 <span class="opt">（任意）</span></label>
        <textarea id="remark" placeholder="例：いつもお世話になっております。" style="min-height:110px;"></textarea>
      </div>
    </div>
  </section>

  <!-- STEP 4 -->
  <section class="panel" id="panel4">
    <div class="preview-note">
      下のプレビューで内容をご確認ください。<br>
      「PDFとして保存する」を押すと印刷画面が開きます。Android では <b>印刷 → PDFに保存</b> を選んで保存できます。
    </div>
    <div class="inv-scroll">
      <div class="invoice" id="invoice"></div>
    </div>
  </section>

</div>

<!-- Navigation -->
<div class="nav-btns" id="navBtns"></div>

<div id="toast"></div>

<script>
"use strict";

/* ====== State ====== */
let current = 1;
const MAX_ROWS = 10;
let rows = [];        // {name, qty, unit, price}
let stampData = null; // base64

/* ====== Utils ====== */
function yen(n){ return '¥' + (Number(n)||0).toLocaleString('ja-JP'); }
function val(id){ return (document.getElementById(id).value || '').trim(); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ====== Detail rows ====== */
function addRow(data){
  if(rows.length >= MAX_ROWS){ toast('明細は最大10行までです'); return; }
  rows.push(data || {name:'',qty:'',unit:'',price:''});
  renderRows();
  recalc();
}
function delRow(i){
  rows.splice(i,1);
  renderRows();
  recalc();
}
function renderRows(){
  const list = document.getElementById('detailList');
  list.innerHTML = '';
  rows.forEach((r,i)=>{
    const div = document.createElement('div');
    div.className = 'detail-row';
    const amt = (Number(r.qty)||0) * (Number(r.price)||0);
    div.innerHTML = `
      <div class="dr-head">
        <span class="dr-no">明細 ${i+1}</span>
        <button class="dr-del" onclick="delRow(${i})">削除</button>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <span class="mini-lbl">内容</span>
        <input type="text" placeholder="例：作業代"
          value="${esc(r.name)}" oninput="upd(${i},'name',this.value)">
      </div>
      <div class="grid3">
        <div class="g-qty">
          <span class="mini-lbl">数量</span>
          <input type="number" inputmode="decimal" placeholder="10"
            value="${esc(r.qty)}" oninput="upd(${i},'qty',this.value)">
        </div>
        <div class="g-qty">
          <span class="mini-lbl">単位</span>
          <input type="text" placeholder="日"
            value="${esc(r.unit)}" oninput="upd(${i},'unit',this.value)">
        </div>
        <div class="g-price">
          <span class="mini-lbl">単価</span>
          <input type="number" inputmode="numeric" placeholder="12000"
            value="${esc(r.price)}" oninput="upd(${i},'price',this.value)">
        </div>
      </div>
      <div class="dr-amt"><span>金額</span>${yen(amt)}</div>
    `;
    list.appendChild(div);
  });
  document.getElementById('addRow').disabled = (rows.length >= MAX_ROWS);
}
function upd(i,key,v){
  rows[i][key] = v;
  if(key==='qty' || key==='price'){
    // update only the amount label for this row
    const amt = (Number(rows[i].qty)||0) * (Number(rows[i].price)||0);
    const node = document.querySelectorAll('#detailList .dr-amt')[i];
    if(node) node.innerHTML = '<span>金額</span>' + yen(amt);
    recalc();
  }
}

/* ====== Calc ====== */
function calcTotals(){
  let sub = 0;
  rows.forEach(r=>{ sub += (Number(r.qty)||0) * (Number(r.price)||0); });
  const rate = Number(val('taxType'))||0;
  const tax = Math.floor(sub * rate / 100);
  return {sub, tax, total: sub + tax, rate};
}
function recalc(){
  const {sub,tax,total} = calcTotals();
  document.getElementById('mSub').textContent = yen(sub);
  document.getElementById('mTax').textContent = yen(tax);
  document.getElementById('mTotal').textContent = yen(total);
}

/* ====== Stamp ====== */
function onStampSelect(e){
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    stampData = ev.target.result;
    renderStamp();
    toast('印鑑画像を設定しました');
  };
  reader.readAsDataURL(f);
}
function renderStamp(){
  const p = document.getElementById('stampPreview');
  if(stampData){
    p.innerHTML = `<img src="${stampData}" alt="印鑑">
      <button class="rm" onclick="removeStamp()">削除する</button>`;
  }else{
    p.innerHTML = '';
  }
}
function removeStamp(){
  stampData = null;
  document.getElementById('stampInput').value = '';
  renderStamp();
}

/* ====== Steps ====== */
function goStep(n){
  if(n<1||n>4) return;
  current = n;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel'+n).classList.add('active');
  // progress
  document.querySelectorAll('#progress .step').forEach(s=>{
    const st = Number(s.dataset.step);
    s.classList.remove('active','done');
    if(st===n) s.classList.add('active');
    else if(st<n) s.classList.add('done');
  });
  renderNav();
  if(n===4) buildInvoice();
  window.scrollTo(0,0);
}
function renderNav(){
  const nav = document.getElementById('navBtns');
  let html = '';
  if(current>1) html += `<button class="btn btn-back" onclick="goStep(${current-1})">戻る</button>`;
  if(current<4){
    html += `<button class="btn btn-next" onclick="goStep(${current+1})">次へ進む</button>`;
  }else{
    html += `<button class="btn btn-back" onclick="goStep(3)">戻って修正する</button>`;
    html += `<button class="btn btn-pdf" onclick="printInvoice()">PDFとして保存する</button>`;
  }
  nav.innerHTML = html;
}

/* ====== Build invoice HTML (shared by preview & print) ====== */
function invoiceMarkup(){
  const client = esc(val('clientName')) || '　　　　　　';
  const person = val('clientPerson') ? esc(val('clientPerson'))+' 様' : '';
  const iName = esc(val('issuerName'));
  const iZip  = val('issuerZip') ? esc(val('issuerZip')) : '';
  const iAddr = esc(val('issuerAddr'));
  const iTel  = val('issuerTel');
  const iFax  = val('issuerFax');
  const subject = esc(val('subject'));
  const due = esc(val('dueDate'));
  const bank = esc(val('bank'));
  const remark = esc(val('remark'));
  const {sub,tax,total,rate} = calcTotals();

  // detail rows: fixed display of at least 8 lines
  const minLines = 8;
  const lineCount = Math.max(minLines, rows.length);
  let bodyRows = '';
  for(let i=0;i<lineCount;i++){
    const r = rows[i];
    if(r && (r.name || r.qty || r.price)){
      const amt = (Number(r.qty)||0)*(Number(r.price)||0);
      const qtyText = (r.qty||'') + (r.unit||'');
      bodyRows += `<tr>
        <td>${esc(r.name)}</td>
        <td class="c">${esc(qtyText)}</td>
        <td class="r">${r.price?yen(r.price):''}</td>
        <td class="r">${yen(amt)}</td>
      </tr>`;
    }else{
      bodyRows += `<tr><td>&nbsp;</td><td></td><td></td><td class="r">¥0</td></tr>`;
    }
  }
  const taxLabel = rate>0 ? `消費税（${rate}%）` : '消費税';

  const stampImg = stampData
    ? `<div class="iv-stamp"><img src="${stampData}" alt="印"></div>` : '';

  const personLine = person ? `<div style="margin-top:6px;font-size:14px;">${person}</div>` : '';

  return `
    <h1 class="iv-title">請　求　書</h1>
    <div class="iv-top">
      <div>
        <div class="iv-client"><span>${client}</span><span>御中</span></div>
        ${personLine}
      </div>
      <div class="iv-issuer">
        <div class="iv-info">
          <div class="nm">${iName}</div>
          ${iZip?`<div>${iZip}</div>`:''}
          ${iAddr?`<div>${iAddr}</div>`:''}
          <div>TEL ${esc(iTel)}</div>
          <div>FAX ${esc(iFax)}</div>
        </div>
        ${stampImg}
      </div>
    </div>

    <div class="iv-body">
      <div>下記の通り、御請求申し上げます。</div>
      <div class="ind">件名：${subject}</div>
      <div class="ind">支払期限：${due}</div>
      <div class="ind">振込先：${bank}</div>
    </div>

    <div class="iv-grand">
      <div class="g-lbl">合計金額</div>
      <div class="g-val">${yen(total)}</div>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-name">内　容</th>
          <th class="col-qty">数量</th>
          <th class="col-price">単価</th>
          <th class="col-amt">金額</th>
        </tr>
      </thead>
      <tbody>
        ${bodyRows}
        <tr>
          <td colspan="2" class="sum-lbl">小計</td>
          <td class="r" colspan="2">${yen(sub)}</td>
        </tr>
        <tr>
          <td colspan="2" class="sum-lbl">${taxLabel}</td>
          <td class="r" colspan="2">${tax>0?yen(tax):''}</td>
        </tr>
        <tr>
          <td colspan="2" class="sum-lbl">合計</td>
          <td class="r" colspan="2">${yen(total)}</td>
        </tr>
      </tbody>
    </table>

    <div class="iv-remark">
      <div class="rm-h">備　考</div>
      <div class="rm-b">${remark}</div>
    </div>
  `;
}
function buildInvoice(){
  document.getElementById('invoice').innerHTML = invoiceMarkup();
}
