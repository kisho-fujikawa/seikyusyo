<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INVOICE CREATOR</title>
<style>
  :root{
    --navy:#0f1923;
    --navy2:#2c3e55;
    --gold:#c0a96e;
    --gold-lt:#f0e8d5;
    --bg:#f4f5f7;
    --muted:#7a8496;
    --border:#d8dce6;
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
    background:var(--bg);
    color:var(--navy);
    font-size:15px;
    line-height:1.6;
    min-width:320px;
  }
  header{
    background:var(--navy);
    color:#fff;
    padding:16px;
    text-align:center;
  }
  header h1{
    margin:0;
    font-size:18px;
    letter-spacing:3px;
    font-weight:600;
  }
  header p{
    margin:4px 0 0;
    font-size:11px;
    color:var(--gold);
    letter-spacing:1px;
  }
  /* progress bar */
  .progress{
    display:flex;
    background:var(--navy2);
  }
  .progress .step{
    flex:1;
    text-align:center;
    padding:10px 4px;
    color:#9aa7b8;
    font-size:11px;
    position:relative;
  }
  .progress .step .num{
    display:block;
    font-size:14px;
    font-weight:700;
    margin-bottom:2px;
  }
  .progress .step.active{
    color:var(--navy);
    background:var(--gold);
  }
  .progress .step.done{
    color:var(--gold);
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:16px;
  }
  .card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 1px 4px rgba(15,25,35,.08);
    padding:18px 16px;
    margin-bottom:16px;
  }
  .card h2{
    font-size:15px;
    margin:0 0 16px;
    padding-left:10px;
    border-left:4px solid var(--gold);
    line-height:1.3;
  }
  .card h3{
    font-size:13px;
    color:var(--muted);
    margin:18px 0 10px;
    border-bottom:1px solid var(--border);
    padding-bottom:6px;
  }
  label.fld{
    display:block;
    margin-bottom:14px;
  }
  label.fld > span{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:5px;
    font-weight:600;
  }
  input,select,textarea{
    width:100%;
    font-family:inherit;
    font-size:15px;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--navy);
    outline:none;
  }
  input:focus,select:focus,textarea:focus{
    border-color:var(--gold);
  }
  textarea{resize:vertical;min-height:70px;}
  .hint{
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
  }
  /* detail rows */
  .item-row{
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px;
    margin-bottom:12px;
    position:relative;
    background:#fbfbfd;
  }
  .item-row .rownum{
    font-size:11px;
    color:var(--gold);
    font-weight:700;
    margin-bottom:8px;
  }
  .item-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .item-grid .full{grid-column:1/3;}
  .item-grid label{margin:0;}
  .item-grid label > span{
    font-size:11px;
    color:var(--muted);
    display:block;
    margin-bottom:3px;
  }
  .item-grid input{padding:9px 10px;font-size:14px;}
  .row-amount{
    grid-column:1/3;
    text-align:right;
    font-weight:700;
    font-size:14px;
    padding-top:4px;
  }
  .del-btn{
    position:absolute;
    top:8px;right:8px;
    background:none;border:none;
    color:#c0392b;
    font-size:18px;
    width:28px;height:28px;
    cursor:pointer;
    padding:0;
  }
  .add-btn{
    width:100%;
    padding:11px;
    background:#fff;
    border:1.5px dashed var(--gold);
    color:var(--gold);
    border-radius:8px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .add-btn:disabled{opacity:.4;border-style:solid;cursor:default;}
  /* totals */
  .totalbox{
    background:var(--navy);
    color:#fff;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-top:16px;
  }
  .totalbox .line{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    font-size:14px;
  }
  .totalbox .line.grand{
    border-top:1px solid #3a4a5c;
    margin-top:6px;
    padding-top:10px;
    font-size:18px;
    font-weight:700;
  }
  .totalbox .grand span:last-child{color:var(--gold);}
  /* seal */
  .seal-area{text-align:center;margin:8px 0;}
  .seal-btn{
    display:inline-block;
    background:var(--navy);
    color:#fff;
    padding:11px 22px;
    border:none;
    border-radius:8px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  #sealPreview{
    margin:14px auto 0;
    width:90px;height:90px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid var(--border);
    display:none;
  }
  .seal-clear{
    display:block;
    margin:8px auto 0;
    background:none;border:none;
    color:var(--muted);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
  }
  /* nav buttons */
  .nav{
    display:flex;
    gap:10px;
    margin-top:8px;
  }
  .btn{
    flex:1;
    padding:14px;
    border-radius:8px;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    border:none;
  }
  .btn-next{background:var(--navy);color:#fff;}
  .btn-back{background:#fff;color:var(--navy);border:1.5px solid var(--border);}
  .btn-pdf{background:var(--gold);color:var(--navy);}
  /* preview */
  .preview-note{
    background:var(--gold-lt);
    border-radius:8px;
    padding:10px 12px;
    font-size:12px;
    color:#7a6a3e;
    margin-bottom:14px;
    line-height:1.5;
  }
  #previewArea{
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    padding:16px;
    overflow-x:auto;
    font-size:12px;
  }
  /* toast */
  #toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%) translateY(20px);
    background:var(--navy);
    color:#fff;
    padding:12px 22px;
    border-radius:30px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:all .3s;
    z-index:999;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none;}

  /* ---- invoice preview shared layout ---- */
  .inv{font-family:'Hiragino Sans','Noto Sans JP','MS Gothic',sans-serif;color:#000;}
  .inv .inv-title{text-align:center;font-size:24px;letter-spacing:14px;margin:0 0 22px;font-weight:600;}
  .inv-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .inv-to{font-size:15px;padding-top:6px;}
  .inv-to .to-name{font-size:17px;}
  .inv-to .to-name b{font-weight:600;}
  .inv-to .ochu{margin-left:14px;font-size:15px;}
  .inv-to .tanto{font-size:12px;margin-top:4px;}
  .inv-from{font-size:12px;text-align:left;position:relative;line-height:1.7;}
  .inv-from .from-top{display:flex;align-items:flex-start;gap:6px;}
  .inv-from .from-name{font-weight:700;font-size:14px;}
  .inv-from .reg{font-size:9px;}
  .inv-seal{width:58px;height:58px;border-radius:50%;object-fit:cover;}
  .inv-body{margin:20px 0 6px;font-size:13px;line-height:2;}
  .inv-body .ind{padding-left:2em;}
  .inv-totalbox{display:table;width:50%;border:1.5px solid #333;margin:8px 0 22px;border-collapse:collapse;}
  .inv-totalbox .c{display:table-cell;padding:8px 12px;border:1.5px solid #333;}
  .inv-totalbox .c.lbl{width:42%;font-size:14px;}
  .inv-totalbox .c.val{text-align:right;font-size:15px;}
  table.inv-tbl{width:100%;border-collapse:collapse;font-size:12px;}
  table.inv-tbl th,table.inv-tbl td{border:1px solid #333;padding:5px 8px;}
  table.inv-tbl th{text-align:center;font-weight:600;}
  table.inv-tbl td.c-naiyo{text-align:left;}
  table.inv-tbl td.c-num{text-align:center;width:14%;}
  table.inv-tbl td.c-tanka{text-align:right;width:18%;}
  table.inv-tbl td.c-kin{text-align:right;width:20%;}
  table.inv-tbl th.h-naiyo{letter-spacing:6px;}
  table.inv-tbl td.sum-lbl{text-align:center;}
  .inv-bikou{border:1px solid #333;margin-top:24px;border-collapse:collapse;width:100%;}
  .inv-bikou .bk-head{text-align:center;border-bottom:1px solid #333;padding:6px;font-size:13px;letter-spacing:8px;}
  .inv-bikou .bk-body{padding:10px;min-height:70px;font-size:12px;white-space:pre-wrap;}
</style>
</head>
<body>
<header>
  <h1>INVOICE CREATOR</h1>
  <p>請求書作成</p>
</header>

<div class="progress" id="progress">
  <div class="step active" data-s="1"><span class="num">01</span>基本情報</div>
  <div class="step" data-s="2"><span class="num">02</span>明細</div>
  <div class="step" data-s="3"><span class="num">03</span>印鑑・備考</div>
  <div class="step" data-s="4"><span class="num">04</span>確認・出力</div>
</div>

<div class="wrap">

  <!-- STEP 1 -->
  <section id="s1">
    <div class="card">
      <h2>STEP 01 ― 基本情報</h2>
      <h3>請求先</h3>
      <label class="fld"><span>会社名（「御中」は自動付与）</span>
        <input id="toCompany" placeholder="株式会社〇〇商事"></label>
      <label class="fld"><span>担当者名（任意）</span>
        <input id="toPerson" placeholder="山田 太郎 様"></label>

      <h3>発行者</h3>
      <label class="fld"><span>氏名</span>
        <input id="fromName" placeholder="山田 花子"></label>
      <label class="fld"><span>郵便番号</span>
        <input id="fromZip" placeholder="100-0001"></label>
      <label class="fld"><span>住所</span>
        <input id="fromAddr" placeholder="東京都千代田区〇〇1-2-3"></label>
      <label class="fld"><span>登録番号（インボイス・任意）</span>
        <input id="fromReg" placeholder="T1234567890123"></label>
      <label class="fld"><span>電話番号</span>
        <input id="fromTel" type="tel" inputmode="numeric" placeholder="09012345678" oninput="onTel(this)">
        <span class="hint">ハイフン不要・数字のみ入力</span></label>
      <label class="fld"><span>FAX（任意）</span>
        <input id="fromFax" type="tel" inputmode="numeric" placeholder="0312345678" oninput="onTel(this)">
        <span class="hint">ハイフン不要・数字のみ入力</span></label>

      <h3>請求内容</h3>
      <label class="fld"><span>件名</span>
        <input id="subject" placeholder="作業代"></label>
      <label class="fld"><span>支払期限</span>
        <input id="duedate" placeholder="2024-12-31"></label>
      <label class="fld"><span>振込先</span>
        <input id="bank" placeholder="〇〇銀行 △△支店 普通 1234567"></label>
    </div>
    <div class="nav">
      <button class="btn btn-next" onclick="go(2)">次へ</button>
    </div>
  </section>

  <!-- STEP 2 -->
  <section id="s2" class="hidden">
    <div class="card">
      <h2>STEP 02 ― 明細</h2>
      <div id="items"></div>
      <button class="add-btn" id="addBtn" onclick="addItem()">＋ 品目を追加</button>

      <label class="fld" style="margin-top:18px;"><span>消費税</span>
        <select id="taxMode" onchange="calc()">
          <option value="0">なし</option>
          <option value="10">10%</option>
          <option value="8">8%（軽減）</option>
        </select></label>

      <div class="totalbox">
        <div class="line"><span>小計</span><span id="vSub">¥0</span></div>
        <div class="line"><span>消費税</span><span id="vTax">¥0</span></div>
        <div class="line grand"><span>合計</span><span id="vTotal">¥0</span></div>
      </div>
    </div>
    <div class="nav">
      <button class="btn btn-back" onclick="go(1)">戻る</button>
      <button class="btn btn-next" onclick="go(3)">次へ</button>
    </div>
  </section>

  <!-- STEP 3 -->
  <section id="s3" class="hidden">
    <div class="card">
      <h2>STEP 03 ― 印鑑・備考</h2>
      <h3>印鑑画像</h3>
      <div class="seal-area">
        <input type="file" id="sealInput" accept="image/*" style="display:none" onchange="onSeal(this)">
        <button class="seal-btn" onclick="document.getElementById('sealInput').click()">印鑑画像を選択</button>
        <img id="sealPreview" alt="印鑑プレビュー">
        <button class="seal-clear hidden" id="sealClear" onclick="clearSeal()">削除する</button>
      </div>
      <h3>備考</h3>
      <label class="fld"><span>備考（自由入力）</span>
        <textarea id="bikou" placeholder="ご不明な点がございましたらお問い合わせください。"></textarea></label>
    </div>
    <div class="nav">
      <button class="btn btn-back" onclick="go(2)">戻る</button>
      <button class="btn btn-next" onclick="go(4)">次へ</button>
    </div>
  </section>

  <!-- STEP 4 -->
  <section id="s4" class="hidden">
    <div class="card">
      <h2>STEP 04 ― 確認・出力</h2>
      <div class="preview-note">
        Android では「PDFとして保存する」を押すと印刷画面が開きます。プリンタ選択で<b>「PDFに保存」</b>を選んでください。
      </div>
      <div id="previewArea"></div>
    </div>
    <div class="nav">
      <button class="btn btn-back" onclick="go(3)">戻って修正する</button>
      <button class="btn btn-pdf" onclick="printInvoice()">PDFとして保存する</button>
    </div>
  </section>

</div>

<div id="toast"></div>

<script>
/* ---------- state ---------- */
var items = [];
var sealData = null;
var MAX = 10;

/* ---------- helpers ---------- */
function yen(n){ return '¥' + (n||0).toLocaleString('ja-JP'); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2000);
}

function formatTel(val){
  var d=(val||'').replace(/\D/g,'');
  if(d.length===11) return d.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
  if(d.length===10 && (d.indexOf('03')===0 || d.indexOf('06')===0))
    return d.replace(/(\d{2})(\d{4})(\d{4})/,'$1-$2-$3');
  if(d.length===10) return d.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  return d;
}
function onTel(el){
  var pos=el.selectionStart, before=el.value;
  el.value=formatTel(el.value);
}

/* ---------- step nav ---------- */
function go(n){
  for(var i=1;i<=4;i++){
    document.getElementById('s'+i).classList.toggle('hidden', i!==n);
  }
  var steps=document.querySelectorAll('.progress .step');
  steps.forEach(function(st){
    var s=+st.getAttribute('data-s');
    st.classList.toggle('active', s===n);
    st.classList.toggle('done', s<n);
  });
  if(n===4) renderPreview();
  window.scrollTo(0,0);
}

/* ---------- items ---------- */
function addItem(){
  if(items.length>=MAX){ toast('最大10行までです'); return; }
  items.push({name:'',qty:'',unit:'',price:''});
  renderItems(); calc();
}
function delItem(i){
  items.splice(i,1); renderItems(); calc();
}
function updItem(i,key,val){
  items[i][key]=val;
  if(key==='price'||key==='qty'){
    var amtEl=document.getElementById('amt'+i);
    if(amtEl) amtEl.textContent='金額：'+yen(rowAmount(items[i]));
    calc();
  }
}
function rowAmount(it){
  var q=parseFloat((it.qty||'').replace(/[^\d.]/g,''))||0;
  var p=parseFloat((it.price||'').replace(/[^\d.]/g,''))||0;
  return Math.round(q*p);
}
function renderItems(){
  var html='';
  items.forEach(function(it,i){
    html+='<div class="item-row">'+
      '<button class="del-btn" onclick="delItem('+i+')">✕</button>'+
      '<div class="rownum">No.'+(i+1)+'</div>'+
      '<div class="item-grid">'+
        '<label class="full"><span>内容（品目名）</span>'+
          '<input value="'+esc(it.name)+'" placeholder="作業費" oninput="updItem('+i+",'name',this.value)\"></label>"+
        '<label><span>数量（単位付き 例:10日）</span>'+
          '<input value="'+esc(it.qty)+'" placeholder="10日" oninput="updItem('+i+",'qty',this.value)\"></label>"+
        '<label><span>単価</span>'+
          '<input value="'+esc(it.price)+'" inputmode="numeric" placeholder="12000" oninput="updItem('+i+",'price',this.value)\"></label>"+
        '<div class="row-amount" id="amt'+i+'">金額：'+yen(rowAmount(it))+'</div>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('items').innerHTML=html;
  document.getElementById('addBtn').disabled = items.length>=MAX;
}

/* ---------- totals ---------- */
function getTotals(){
  var sub=0;
  items.forEach(function(it){ sub+=rowAmount(it); });
  var rate=parseInt(document.getElementById('taxMode').value,10)||0;
  var tax=Math.floor(sub*rate/100);
  return {sub:sub, tax:tax, rate:rate, total:sub+tax};
}
function calc(){
  var t=getTotals();
  document.getElementById('vSub').textContent=yen(t.sub);
  document.getElementById('vTax').textContent=yen(t.tax);
  document.getElementById('vTotal').textContent=yen(t.total);
}

/* ---------- seal ---------- */
function onSeal(input){
  var f=input.files&&input.files[0];
  if(!f) return;
  var r=new FileReader();
  r.onload=function(e){
    sealData=e.target.result;
    var img=document.getElementById('sealPreview');
    img.src=sealData; img.style.display='block';
    document.getElementById('sealClear').classList.remove('hidden');
    toast('印鑑を読み込みました');
  };
  r.readAsDataURL(f);
}
function clearSeal(){
  sealData=null;
  document.getElementById('sealPreview').style.display='none';
  document.getElementById('sealInput').value='';
  document.getElementById('sealClear').classList.add('hidden');
}

/* ---------- build invoice HTML (shared by preview + print) ---------- */
function val(id){ return document.getElementById(id).value.trim(); }

function buildInvoiceHTML(){
  var toCompany=val('toCompany');
  var toPerson=val('toPerson');
  var fromName=val('fromName');
  var fromZip=val('fromZip');
  var fromAddr=val('fromAddr');
  var fromReg=val('fromReg');
  var fromTel=val('fromTel');
  var fromFax=val('fromFax');
  var subject=val('subject');
  var duedate=val('duedate');
  var bank=val('bank');
  var bikou=val('bikou');
  var t=getTotals();

  // detail rows: fixed 8 rows
  var ROWS=8;
  var rowsHtml='';
  for(var i=0;i<ROWS;i++){
    var it=items[i];
    if(it){
      rowsHtml+='<tr>'+
        '<td class="c-naiyo">'+esc(it.name)+'</td>'+
        '<td class="c-num">'+esc(it.qty)+'</td>'+
        '<td class="c-tanka">'+(it.price?yen(parseFloat(it.price.replace(/[^\d.]/g,''))||0):'')+'</td>'+
        '<td class="c-kin">'+yen(rowAmount(it))+'</td></tr>';
    } else {
      rowsHtml+='<tr><td class="c-naiyo">&nbsp;</td><td class="c-num"></td><td class="c-tanka"></td><td class="c-kin">¥0</td></tr>';
    }
  }
  // summary rows
  rowsHtml+='<tr><td class="c-naiyo sum-lbl" colspan="2"></td><td class="c-tanka sum-lbl">小計</td><td class="c-kin">'+yen(t.sub)+'</td></tr>';
  rowsHtml+='<tr><td class="c-naiyo sum-lbl" colspan="2"></td><td class="c-tanka sum-lbl">消費税</td><td class="c-kin">'+(t.rate?yen(t.tax):'')+'</td></tr>';
  rowsHtml+='<tr><td class="c-naiyo sum-lbl" colspan="2"></td><td class="c-tanka sum-lbl">合計</td><td class="c-kin">'+yen(t.total)+'</td></tr>';

  var fromHtml='<div class="inv-from">'+
    '<div class="from-top">'+
      '<div>'+
        '<div class="from-name">'+esc(fromName)+'</div>'+
        (fromZip?('<div>'+esc(fromZip)+'</div>'):'')+
        (fromAddr?('<div>'+esc(fromAddr)+'</div>'):'')+
        (fromReg?('<div class="reg">登録番号 '+esc(fromReg)+'</div>'):'')+
        '<div>TEL '+esc(fromTel)+'</div>'+
        '<div>FAX '+esc(fromFax)+'</div>'+
      '</div>'+
      (sealData?('<img class="inv-seal" src="'+sealData+'">'):'')+
    '</div>'+
  '</div>';

  return '<div class="inv" style="page-break-inside:avoid">'+
    '<h1 class="inv-title">請求書</h1>'+
    '<div class="inv-head">'+
      '<div class="inv-to">'+
        '<span class="to-name"><b>'+esc(toCompany)+'</b></span>'+
        '<span class="ochu">御中</span>'+
        (toPerson?('<div class="tanto">'+esc(toPerson)+'</div>'):'')+
      '</div>'+
      fromHtml+
    '</div>'+
    '<div class="inv-body">'+
      '下記の通り、御請求申し上げます。'+
      '<div class="ind">件名：'+esc(subject)+'</div>'+
      '<div class="ind">支払期限：'+esc(duedate)+'</div>'+
      '<div class="ind">振込先：'+esc(bank)+'</div>'+
    '</div>'+
    '<div class="inv-totalbox">'+
      '<div class="c lbl">合計金額</div>'+
      '<div class="c val">'+yen(t.total)+'</div>'+
    '</div>'+
    '<table class="inv-tbl">'+
      '<thead><tr>'+
        '<th class="h-naiyo">内　容</th><th>数量</th><th>単価</th><th>金額</th>'+
      '</tr></thead>'+
      '<tbody>'+rowsHtml+'</tbody>'+
    '</table>'+
    '<table class="inv-bikou">'+
      '<tr><td class="bk-head">備　考</td></tr>'+
      '<tr><td class="bk-body">'+esc(bikou)+'</td></tr>'+
    '</table>'+
  '</div>';
}

function renderPreview(){
  document.getElementById('previewArea').innerHTML=buildInvoiceHTML();
}
